name: Build release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only — do not create a Release even on tag push'
        required: false
        default: 'true'

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x64
            artifact: defrag-linux-x64.tar.gz
            python: '3.12'
          - os: windows-latest
            target: windows-x64
            artifact: defrag-windows-x64.zip
            python: '3.12'
          - os: macos-14
            target: macos-arm64
            artifact: defrag-macos-arm64.zip
            python: '3.12'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Install Linux SDL2 (runtime libs)
        if: matrix.target == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0 libsdl2-ttf-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0

      - name: Build with PyInstaller
        run: pyinstaller defrag.spec --clean --noconfirm

      - name: Package — Linux
        if: matrix.target == 'linux-x64'
        run: |
          cd dist
          tar -czf defrag-linux-x64.tar.gz defrag-linux-x64
          ls -la

      - name: Package — Windows
        if: matrix.target == 'windows-x64'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path 'DEFRAG.EXE.exe' -DestinationPath 'defrag-windows-x64.zip'
          Get-ChildItem

      - name: Package — macOS ARM64
        if: matrix.target == 'macos-arm64'
        run: |
          cd dist
          zip -r defrag-macos-arm64.zip DEFRAG.app
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  # macOS Intel runs separately and is NOT a gate on the `release` job.
  # The macos-13 runner queue on free-tier GitHub Actions can be very long
  # (10+ minutes), and we don't want every v* release to wait on it.
  # If this job builds successfully the artifact lives on the workflow run's
  # Artifacts list for manual download or for a later attach-to-release step.
  build-macos-intel:
    name: Build (macos-intel — best-effort, not in release)
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller defrag.spec --clean --noconfirm

      - name: Package
        run: |
          cd dist
          zip -r defrag-macos-intel.zip DEFRAG.app
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: defrag-macos-intel.zip
          path: dist/defrag-macos-intel.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    # Only depends on the core 3-platform matrix. build-macos-intel does NOT
    # gate this job — release fires as soon as Linux + Windows + macOS-ARM64
    # are ready, regardless of Intel's queue state.
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Download only the artifacts we want in the release — by name, not by
      # glob. This guarantees the intel zip can never sneak in via a race
      # condition even if it happens to finish before this job runs.
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: defrag-linux-x64.tar.gz
          path: release
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: defrag-windows-x64.zip
          path: release
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: defrag-macos-arm64.zip
          path: release

      - name: List release files
        run: ls -la release/

      # Use a hand-written per-tag notes file if it exists
      # (e.g. .github/RELEASE_NOTES_v0.1.md); otherwise fall back to
      # GitHub's auto-generated notes.
      - name: Resolve release-notes file
        id: notes
        run: |
          TAG="${GITHUB_REF##*/}"
          NOTES=".github/RELEASE_NOTES_${TAG}.md"
          if [ -f "$NOTES" ]; then
            echo "path=$NOTES" >> "$GITHUB_OUTPUT"
            echo "Using hand-written notes: $NOTES"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "No hand-written notes for $TAG; falling back to auto-generated."
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.path == '' }}
          fail_on_unmatched_files: true
